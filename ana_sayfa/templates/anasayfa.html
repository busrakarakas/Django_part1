<!DOCTYPE html>
<html>
<head><meta charset="utf-8">

<title>Büşra'nın Web Sayfası</title>

<style>

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: Arial;
    text-align:center;
    color:white;
}

.kart{
    background:white;
    color:black;
    width:400px;
    margin:auto;
    margin-top:120px;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.3);
}

h1{
    color:#764ba2;
}

button{
    background:#764ba2;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5a3c91;
}

</style>

</head>

<body>

<div class="kart">

<h1>Merhaba 👋</h1>

<p>Ben <b>Büşra</b> ve Django öğreniyorum.</p>

<p>Bu sayfa Django ile oluşturuldu.</p>

<button>Daha Fazla</button>

</div>

</body>
</html>
